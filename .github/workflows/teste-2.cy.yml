name: Testes E2E + Publicar Report

on:
  push:
    branches: [main]
  workflow_dispatch:   # permite rodar manualmente pela aba Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Rodar Cypress
        uses: cypress-io/github-action@v6
        continue-on-error: true   # gera o report mesmo se testes falharem

      - name: Gerar report HTML
        run: npm run report

      - name: Upload do artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: cypress/reports/   # a pasta onde está o index.html

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4